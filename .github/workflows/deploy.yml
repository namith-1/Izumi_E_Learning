name: Deploy to Render

on:
  push:
    branches:
      - main

jobs:
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    # Only run if files in backend/ or root config files changed
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for Backend Changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'

      - name: Trigger Render Backend Deploy
        if: steps.changes.outputs.backend == 'true'
        env:
          BACKEND_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}
        run: |
          if [ -z "$BACKEND_HOOK" ]; then
            echo "RENDER_DEPLOY_HOOK_BACKEND not set, skipping"
          else
            curl -X POST "$BACKEND_HOOK"
          fi

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for Frontend Changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'frontend/**'

      - name: Trigger Render Frontend Deploy
        if: steps.changes.outputs.frontend == 'true'
        env:
          FRONTEND_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}
        run: |
          if [ -z "$FRONTEND_HOOK" ]; then
            echo "RENDER_DEPLOY_HOOK_FRONTEND not set, skipping"
          else
            curl -X POST "$FRONTEND_HOOK"
          fi
