name: Izumi CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run Tests
        run: npm run test:report
        env:
          NODE_ENV: test
          # Add other necessary dummy env vars for tests if needed
          
      - name: Upload Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-report
          path: ./backend/test-report.html
          retention-days: 7

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run Build
        run: npm run build
        env:
          # You might need to set VITE_API_BASE_URL here if the build depends on it
          VITE_API_BASE_URL: https://izumi-e-learning.onrender.com/api

  deploy:
    needs: [backend-tests, frontend-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Frontend Deploy
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}" ]; then
            echo "RENDER_DEPLOY_HOOK_FRONTEND not set, skipping"
          else
            curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}
          fi

      - name: Trigger Backend Deploy
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}" ]; then
            echo "RENDER_DEPLOY_HOOK_BACKEND not set, skipping"
          else
            curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}
          fi
