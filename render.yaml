services:
  # --- Backend Web Service ---
  - type: web
    name: izumi-e-learning   # Aligned with your Render URL
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
    autoDeploy: false
    filter:
      paths:
        - backend/**

  # --- Frontend Static Site ---
  - type: web            # Corrected from 'static'
    name: izumi-e-learning-frontend # Aligned with your Render URL
    runtime: static      # Required for static sites in Blueprints
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist  # Corrected syntax for static runtime
    autoDeploy: false
    filter:
      paths:
        - frontend/**
    envVars:
      - key: VITE_API_BASE_URL
        value: https://izumi-e-learning.onrender.com/api # Corrected to match your backend site
