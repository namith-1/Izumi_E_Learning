services:
  # --- Backend Web Service ---
  - type: web
    name: izumi-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      # Cloudinary and MongoDB vars should be set in the Render Dashboard safely
    autoDeploy: false
    # Build Filter: Only deploy when backend directory changes
    filter:
      paths:
        - backend/**

  # --- Frontend Static Site ---
  - type: static
    name: izumi-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    autoDeploy: false
    # Build Filter: Only deploy when frontend directory changes
    filter:
      paths:
        - frontend/**
    envVars:
      - key: VITE_API_BASE_URL
        value: https://izumi-backend.onrender.com/api # Ensure this matches your backend URL
